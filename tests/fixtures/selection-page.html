<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vocabify Selection Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, 'Times New Roman', serif;
        color: #1f2933;
        background: #f8f5ef;
      }

      main {
        max-width: 760px;
        margin: 72px auto;
        padding: 0 24px;
      }

      article {
        border: 1px solid rgba(31, 41, 51, 0.12);
        border-radius: 18px;
        background: #fffdf8;
        padding: 36px;
        box-shadow: 0 18px 60px rgba(31, 41, 51, 0.08);
      }

      h1 {
        margin: 0 0 18px;
        font-size: 32px;
        line-height: 1.15;
      }

      p {
        font-size: 19px;
        line-height: 1.8;
      }

      pre {
        overflow-x: auto;
        border-radius: 14px;
        padding: 18px;
        color: #e5e7eb;
        background: #111827;
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <h1>Vocabify Extension Test Page</h1>
        <p id="target-paragraph">
          Meticulous readers often pause at a nuanced phrase, then infer its meaning from context before they continue.
        </p>
        <pre><code><span>const</span> <span>label</span> <span>=</span> <span>{</span> <span>kind</span><span>:</span> <span>'literal'</span><span>,</span> <span><span>component</span></span> <span>}</span></code></pre>
      </article>
    </main>
  </body>
</html>
